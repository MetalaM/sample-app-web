name: Deploy to EC2

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            if [[ "$TAG" == *"-rc"* ]]; then
              echo "ENV_NAME=test" >> $GITHUB_ENV
              echo "EC2_HOST=${{ secrets.EC2_HOST_TEST }}" >> $GITHUB_ENV
              echo "PORT=3002" >> $GITHUB_ENV
            else
              echo "ENV_NAME=prod" >> $GITHUB_ENV
              echo "EC2_HOST=${{ secrets.EC2_HOST_PROD }}" >> $GITHUB_ENV
              echo "PORT=3003" >> $GITHUB_ENV
            fi
          else
            echo "ENV_NAME=dev" >> $GITHUB_ENV
            echo "EC2_HOST=${{ secrets.EC2_HOST_DEV }}" >> $GITHUB_ENV
            echo "PORT=3001" >> $GITHUB_ENV
          fi

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure curl and Docker are installed on EC2
        run: |
          ssh -i ~/.ssh/deploy.pem ubuntu@${{ env.EC2_HOST }} "
            which curl || sudo apt install -y curl &&
            which docker || (
              sudo apt update -y &&
              sudo apt install -y ca-certificates curl gnupg &&
              sudo install -m 0755 -d /etc/apt/keyrings &&
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg &&
              echo \"deb [arch=\$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \$(lsb_release -cs) stable\" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null &&
              sudo apt update -y &&
              sudo apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin &&
              sudo systemctl start docker &&
              sudo systemctl enable docker &&
              sudo usermod -aG docker ubuntu
            )
          "

      - name: Build Docker image
        run: docker build -t crud-app-${{ env.ENV_NAME }} .

      - name: Save Docker image
        run: docker save crud-app-${{ env.ENV_NAME }} | gzip > app.tar.gz

      - name: Copy image to EC2
        run: |
          scp -i ~/.ssh/deploy.pem -P 22 app.tar.gz ubuntu@${{ env.EC2_HOST }}:/home/ubuntu/

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy.pem -p 22 ubuntu@${{ env.EC2_HOST }} "
            docker load < /home/ubuntu/app.tar.gz && \
            docker stop crud-app-${{ env.ENV_NAME }} || true && \
            docker rm crud-app-${{ env.ENV_NAME }} || true && \
            docker run -d \
              --name crud-app-${{ env.ENV_NAME }} \
              --restart always \
              -e HOST=0.0.0.0 \
              -p ${{ env.PORT }}:3000 \
              crud-app-${{ env.ENV_NAME }} && \
            docker image prune -f && \
            rm /home/ubuntu/app.tar.gz
          "

      - name: Print deployed URL
        run: echo "Deployed to http://${{ env.EC2_HOST }}:3000"