name: Deploy to EC2

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            if [[ "$TAG" == *"-rc"* ]]; then
              echo "ENV_NAME=test" >> $GITHUB_ENV
              echo "APP_PORT=3002" >> $GITHUB_ENV
            else
              echo "ENV_NAME=prod" >> $GITHUB_ENV
              echo "APP_PORT=3003" >> $GITHUB_ENV
            fi
          else
            echo "ENV_NAME=dev" >> $GITHUB_ENV
            echo "APP_PORT=3001" >> $GITHUB_ENV
          fi

      - name: Build Docker image
        run: docker build -t crud-app-${{ env.ENV_NAME }} .

      - name: Save Docker image
        run: docker save crud-app-${{ env.ENV_NAME }} | gzip > app.tar.gz

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy image to EC2
        run: |
          scp -i ~/.ssh/deploy.pem -P 22 app.tar.gz ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy.pem -p 22 ubuntu@${{ secrets.EC2_HOST }} "
            docker stop crud-app-${{ env.ENV_NAME }} || true
            docker rm crud-app-${{ env.ENV_NAME }} || true
            docker load < /home/ubuntu/app.tar.gz
            docker run -d \
              --name crud-app-${{ env.ENV_NAME }} \
              -p ${{ env.APP_PORT }}:3000 \
              crud-app-${{ env.ENV_NAME }}
            rm /home/ubuntu/app.tar.gz
          "

      - name: Print deployed URL
        run: echo "Deployed to http://${{ secrets.EC2_HOST }}:${{ env.APP_PORT }}"