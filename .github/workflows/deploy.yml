name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment
        run: |
          echo "ENV_NAME=dev" >> $GITHUB_ENV
          echo "APP_PORT=3001" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t crud-app-dev .

      - name: Save Docker image
        run: docker save crud-app-dev | gzip > app.tar.gz

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy image to EC2
        run: |
          scp -i ~/.ssh/deploy.pem -P 22 app.tar.gz ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy.pem -p 22 ubuntu@${{ secrets.EC2_HOST }} "
            docker load < /home/ubuntu/app.tar.gz && \
            docker stop crud-app-dev || true && \
            docker rm crud-app-dev || true && \
            docker run -d \
              --name crud-app-dev \
              --restart always \
              -p 3001:3000 \
              crud-app-dev && \
            docker image prune -f && \
            rm /home/ubuntu/app.tar.gz
          "

      - name: Print deployed URL
        run: echo "Deployed to http://${{ secrets.EC2_HOST }}:3001"