name: Deploy to EC2

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set environment
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            if [[ "$TAG" == *"-rc"* ]]; then
              echo "ENV_NAME=test" >> $GITHUB_ENV
              echo "PORT=3002" >> $GITHUB_ENV
            else
              echo "ENV_NAME=prod" >> $GITHUB_ENV
              echo "PORT=3003" >> $GITHUB_ENV
            fi
          else
            echo "ENV_NAME=dev" >> $GITHUB_ENV
            echo "PORT=3001" >> $GITHUB_ENV
          fi

      - name: Build Docker image
        run: docker build -t crud-app-${{ env.ENV_NAME }} .

      - name: Save Docker image
        run: docker save crud-app-${{ env.ENV_NAME }} | gzip > app.tar.gz

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: app.tar.gz
          target: /home/ubuntu/

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            docker stop crud-app-${{ env.ENV_NAME }} || true
            docker rm crud-app-${{ env.ENV_NAME }} || true
            docker load < /home/ubuntu/app.tar.gz
            docker run -d \
              --name crud-app-${{ env.ENV_NAME }} \
              -p ${{ env.PORT }}:3000 \
              crud-app-${{ env.ENV_NAME }}
            rm /home/ubuntu/app.tar.gz

      - name: Print deployed URL
        run: |
          echo "Deployed to http://${{ secrets.EC2_HOST }}:${{ env.PORT }}"